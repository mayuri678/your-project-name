<div class="modal-overlay" (click)="closeModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <!-- Close Button -->
    <button class="close-btn" (click)="closeModal()" aria-label="Close modal">
      ✕
    </button>

    <!-- Email Step -->
    <div *ngIf="step === 'email'" class="modal-body">
      <h2>🔐 Reset Password</h2>
      <p class="modal-subtitle">Enter your email to receive a password reset link</p>

      <!-- Error Message -->
      <div *ngIf="errorMessage" class="alert alert-error">
        ❌ {{ errorMessage }}
      </div>

      <!-- Form -->
      <form (ngSubmit)="sendResetLink()" class="reset-form">
        <div class="form-group">
          <label for="reset-email">Email Address *</label>
          <input
            type="email"
            id="reset-email"
            [(ngModel)]="email"
            name="email"
            class="form-control"
            placeholder="Enter your email"
            required
            [disabled]="isLoading"
          />
        </div>

        <div class="form-actions">
          <button
            type="submit"
            class="btn btn-primary"
            [disabled]="isLoading || !email.trim()"
          >
            {{ isLoading ? '⏳ Sending...' : '📧 Send Reset Link' }}
          </button>
          <button
            type="button"
            class="btn btn-secondary"
            (click)="closeModal()"
            [disabled]="isLoading"
          >
            Cancel
          </button>
        </div>
      </form>

      <p class="info-text">
        💡 You will receive a password reset link in your email inbox
      </p>
    </div>

    <!-- Success Step -->
    <div *ngIf="step === 'success'" class="modal-body success-state">
      <div class="success-icon">✅</div>
      <h2>Email Sent!</h2>
      <p>{{ successMessage }}</p>
      <p class="info-text">
        Check your email for the password reset link. You will be redirected shortly.
      </p>
    </div>
  </div>
</div>
