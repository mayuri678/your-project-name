<section class="profile-page">
  <div class="profile-container">
    <div class="profile-header">
      <h1>My Profile</h1>
      <p class="subtitle">Manage your profile information</p>
    </div>

    <div *ngIf="successMessage" class="success-message">
      {{ successMessage }}
    </div>

    <div *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="saveProfile()" class="profile-form">
      <!-- Profile Photo Section -->
      <div class="profile-section">
        <h3 class="section-title">📸 Profile Photo</h3>
        <div class="photo-container">
          <div class="photo-placeholder">
            <span>No Photo</span>
          </div>
          <button type="button" class="upload-btn">📤 Upload Photo</button>
          <p class="photo-info">Max size: 5MB (JPG, PNG, GIF)</p>
        </div>
      </div>

      <!-- Personal Information Section -->
      <div class="profile-section">
        <h3 class="section-title">👤 Personal Information</h3>

        <div class="field-group">
          <label for="name" class="field-label">Full Name</label>
          <input
            type="text"
            id="name"
            name="name"
            [(ngModel)]="profile.name"
            class="field-input"
            placeholder="Your full name"
          />
        </div>

        <div class="field-group">
          <label for="email" class="field-label">Email ID</label>
          <input
            type="email"
            id="email"
            name="email"
            [(ngModel)]="profile.email"
            class="field-input"
            placeholder="Your email"
            disabled
          />
        </div>

        <div class="field-group">
          <label for="phone" class="field-label">Contact Number</label>
          <input
            type="tel"
            id="phone"
            name="phone"
            [(ngModel)]="profile.phone"
            class="field-input"
            placeholder="Enter your contact number"
          />
        </div>

        <div class="field-group">
          <label for="address" class="field-label">Address</label>
          <input
            type="text"
            id="address"
            name="address"
            [(ngModel)]="profile.address"
            class="field-input"
            placeholder="Your address"
          />
        </div>

        <div class="field-group">
          <label for="bio" class="field-label">Bio</label>
          <textarea
            id="bio"
            name="bio"
            [(ngModel)]="profile.bio"
            class="field-input"
            placeholder="Tell us about yourself"
            rows="4"
          ></textarea>
        </div>
      </div>

      <!-- Professional Links Section -->
      <div class="profile-section">
        <h3 class="section-title">🔗 Professional Links</h3>

        <div class="field-group">
          <label for="website" class="field-label">Website</label>
          <input
            type="url"
            id="website"
            name="website"
            [(ngModel)]="profile.website"
            class="field-input"
            placeholder="https://yourwebsite.com"
          />
        </div>

        <div class="field-group">
          <label for="linkedin" class="field-label">LinkedIn Profile</label>
          <input
            type="url"
            id="linkedin"
            name="linkedin"
            [(ngModel)]="profile.linkedin"
            class="field-input"
            placeholder="https://linkedin.com/in/yourprofile"
          />
        </div>

        <div class="field-group">
          <label for="github" class="field-label">GitHub Profile</label>
          <input
            type="url"
            id="github"
            name="github"
            [(ngModel)]="profile.github"
            class="field-input"
            placeholder="https://github.com/yourprofile"
          />
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="action-buttons">
        <button type="submit" class="save-btn">💾 Save Changes</button>
        <button type="button" class="change-password-btn" (click)="goToChangePassword()">
          🔐 Change Password
        </button>
      </div>
    </form>
  </div>
</section>
