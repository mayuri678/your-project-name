<app-header 
  [loggedIn]="isLoggedIn" 
  (logout)="onLogout()"
  (login)="onLogin()"
  (about)="onAbout()"
  (resume)="onResume()"
  (templates)="onTemplates()">
</app-header>

<div class="change-password-container">
  <div class="change-password-card">
    <h1>🔐 Change Password</h1>
    <p class="subtitle">Update your password to keep your account secure</p>

    <!-- Success Message -->
    <div *ngIf="successMessage" class="alert alert-success">
      ✅ {{ successMessage }}
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="alert alert-error">
      ❌ {{ errorMessage }}
    </div>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" class="change-password-form">
      <div class="form-group">
        <label for="currentPassword">Current Password *</label>
        <input 
          type="password" 
          id="currentPassword" 
          [(ngModel)]="form.currentPassword"
          name="currentPassword"
          class="form-control"
          placeholder="Enter your current password"
          required>
      </div>

      <div class="form-group">
        <label for="newPassword">New Password *</label>
        <input 
          type="password" 
          id="newPassword" 
          [(ngModel)]="form.newPassword"
          name="newPassword"
          class="form-control"
          placeholder="Enter new password (min 8 chars, 1 number, 1 special char)"
          required>
        <small class="form-text">
          Requirements: At least 8 characters, 1 number, 1 special character
        </small>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password *</label>
        <input 
          type="password" 
          id="confirmPassword" 
          [(ngModel)]="form.confirmPassword"
          name="confirmPassword"
          class="form-control"
          placeholder="Confirm your new password"
          required>
      </div>

      <div class="form-actions">
        <button 
          type="submit" 
          class="btn btn-primary"
          [disabled]="isLoading">
          {{ isLoading ? '⏳ Updating...' : '🔑 Update Password' }}
        </button>
        <button 
          type="button" 
          class="btn btn-secondary"
          (click)="goBack()"
          [disabled]="isLoading">
          ← Back to Settings
        </button>
      </div>
    </form>
  </div>
</div>
